name: field.blocks.heading.name
icon: title
wysiwyg: true
preview: heading

fields:
  level:
    label: field.blocks.heading.level
    type: toggles
    empty: false
    default: "h2"
    labels: false
    options:
      - value: h1
        icon: h1
        text: H1
      - value: h2
        icon: h2
        text: H2
  text:
    label: field.blocks.heading.text
    type: writer
    inline: true
    placeholder: field.blocks.heading.placeholder
  width:
    label: Width
    type: select
    default: medium
    options:
      - value: large
        text: Large
      - value: medium
        text: Medium
      - value: small
        text: Small
