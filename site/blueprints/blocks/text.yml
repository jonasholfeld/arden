name: field.blocks.text.name
icon: text
wysiwyg: true
preview: text

fields:
  text:
    type: writer
    nodes: false
    marks:
      - bold
      - italic
      - underline
      - link
    placeholder: field.blocks.text.placeholder
  textAlign:
    label: Text Align
    type: toggles
    default: center
    options:
      - value: center
        text: Center
      - value: left
        text: Left
